const RAIO_M = 3000;

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distanciaMaisProxima(lat, lon) {
  let menor = Infinity;
  let filialProxima = null;
  filiais.forEach(f => {
    const d = haversineKm(lat, lon, f.lat, f.lon);
    if (d < menor) { menor = d; filialProxima = f.filial; }
  });
  return { dist: menor, filial: filialProxima };
}

// Raio do ponto proporcional ao ticket (escala dentro de um intervalo visualmente legível)
function raioPorTicket(tkt) {
  if (tkt === null) return 4;
  const minR = 3, maxR = 11;
  const pct = (tkt - TKT_MIN) / (TKT_MAX - TKT_MIN || 1);
  return minR + pct * (maxR - minR);
}

});

    btn.style.fontSize = '18px';
    btn.style.cursor = 'pointer';
    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn, 'click', function() {
      const container = document.getElementById('app-container');
      if (!document.fullscreenElement) {
        container.requestFullscreen ? container.requestFullscreen() : container.webkitRequestFullscreen && container.webkitRequestFullscreen();
      } else {
        document.exitFullscreen ? document.exitFullscreen() : document.webkitExitFullscreen && document.webkitExitFullscreen();
      }
    });
    return btn;
  }
});

  let count = 0;
  props.forEach(p => {

}

function abrirPainel(p) {
  const enderecoLinha = p.rua ? `${p.rua}${p.num ? ', ' + p.num : ''}` : '';
  const { dist, filial } = distanciaMaisProxima(p.lat, p.lon);
  const dentro = dist <= (RAIO_M / 1000);
  const badge = dentro
    ? `<span class="badge-in">Dentro do raio de 3km · ${filial}</span>`
    : `<span class="badge-out">Fora do raio · ${dist.toFixed(1)}km de ${filial}</span>`;
  const content = `
    <h3>${p.emp}</h3>
    <div class="row">${enderecoLinha ? enderecoLinha + '<br>' : ''}${p.bairro}, ${p.cidade}</div>
    <div class="row"><b>Status:</b> ${p.status}</div>
    <div class="row"><b>Filial:</b> ${p.filial}</div>
    <div class="row"><b>Tipologia:</b> ${p.tipo}</div>
    <div class="row"><b>Dormitórios:</b> ${p.dorms !== null ? p.dorms : '-'}</div>
    <div class="row"><b>Ticket:</b> ${formatBRL(p.tkt)}</div>
    <div class="row"><b>Metragem:</b> ${p.mts !== null ? formatM2(p.mts) : '-'}</div>
    <div class="row"><b>Entrega:</b> ${p.entrega}</div>
    <div class="row"><small>Lat: ${p.lat}, Lon: ${p.lon}</small></div>
    <div class="row">${badge}</div>
  `;
  document.getElementById('panel-content').innerHTML = content;
  document.getElementById('detail-panel').classList.add('open');
  const filterBox = document.querySelector('.filter-box');
  if (filterBox) filterBox.style.marginRight = '300px';
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  const filterBox = document.querySelector('.filter-box');
  if (filterBox) filterBox.style.marginRight = '0';
});

// Legenda
const legend = L.control({position: 'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  let html = '<b>Filiais</b><br>';
  filiais.forEach(f => {
    const color = colors[f.filial] || '#000';
    html += `<div class="filial-row"><span><span class="swatch" style="background:${color}"></span>${f.filial}</span></div>`;
  });
  html += '<br><span class="swatch" style="background:#bbb;border:1px solid #888"></span>Imóveis<br>';
  html += '<br><span style="display:inline-block;width:13px;height:13px;background:rgba(30,95,165,0.35);border-radius:50%;margin-right:6px;vertical-align:middle;"></span>Raio de 3km<br>';
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

// Controle de busca por lat/long
const searchControl = L.control({position: 'topleft'});
searchControl.onAdd = function() {
  const div = L.DomUtil.create('div', 'search-box');
  div.innerHTML = `
    <input type="text" id="lat-input" placeholder="Latitude (ex: -23.5613)" />
    <input type="text" id="lon-input" placeholder="Longitude (ex: -46.6562)" />
    <button id="addr-btn">Marcar no mapa</button>
    <button id="clear-btn" style="margin-top:6px; background:#888;">Limpar pesquisa</button>
    <div class="search-status" id="addr-status"></div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
searchControl.addTo(map);

let searchMarker = null;

async function marcarCoordenada() {
  const latInput = document.getElementById('lat-input');
  const lonInput = document.getElementById('lon-input');
  const status = document.getElementById('addr-status');

  const lat = parseFloat(latInput.value.trim().replace(',', '.'));
  const lon = parseFloat(lonInput.value.trim().replace(',', '.'));

  if (isNaN(lat) || isNaN(lon)) {
    status.textContent = 'Informe latitude e longitude válidas.';
    return;
  }
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
    status.textContent = 'Valores fora do intervalo permitido.';
    return;
  }

  if (searchMarker) {
    map.removeLayer(searchMarker);
  }
  searchMarker = L.circleMarker([lat, lon], {
    radius: 10,
    color: '#fff',
    weight: 2,
    fillColor: '#E11D2A',
    fillOpacity: 0.95
  }).addTo(map);
  searchMarker.bindPopup(`<b>Ponto marcado</b><br>Lat: ${lat}, Lon: ${lon}<br>Buscando endereço...`).openPopup();
  map.setView([lat, lon], 16);
  status.textContent = 'Buscando endereço...';

  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
    const data = await res.json();
    let endereco = 'Endereço não encontrado.';
    if (data && data.address) {
      const a = data.address;
      const rua = a.road || a.pedestrian || '';
      const numero = a.house_number || '';
      const bairro = a.suburb || a.neighbourhood || '';
      const cidade = a.city || a.town || a.municipality || '';
      endereco = [rua && numero ? `${rua}, ${numero}` : rua, bairro, cidade].filter(Boolean).join(' - ');
      if (!endereco) endereco = data.display_name || 'Endereço não encontrado.';
    }
    searchMarker.setPopupContent(`<b>Ponto marcado</b><br>${endereco}<br>Lat: ${lat}, Lon: ${lon}`);
    status.textContent = 'Marcado!';
  } catch (e) {
    searchMarker.setPopupContent(`<b>Ponto marcado</b><br>Lat: ${lat}, Lon: ${lon}<br><i>Não foi possível obter o endereço.</i>`);
    status.textContent = 'Marcado (sem endereço).';
  }
}

function limparPesquisa() {
  if (searchMarker) {
    map.removeLayer(searchMarker);
    searchMarker = null;
  }
  document.getElementById('lat-input').value = '';
  document.getElementById('lon-input').value = '';
  document.getElementById('addr-status').textContent = '';
}

document.getElementById('addr-btn').addEventListener('click', marcarCoordenada);
document.getElementById('clear-btn').addEventListener('click', limparPesquisa);
['lat-input', 'lon-input'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') marcarCoordenada();
  });
});

// Controle de filtros: ticket (range) + tipologia
const filterControl = L.control({position: 'topleft'});
filterControl.onAdd = function() {
  const div = L.DomUtil.create('div', 'filter-box');
  let opts = '<option value="TODOS">Todas</option>';
  tipologias.forEach(t => { opts += `<option value="${t}">${t}</option>`; });
  let optsDorms = '<option value="TODOS">Todos</option>';
  dormsOpcoes.forEach(d => { optsDorms += `<option value="${d}">${d} dorm.</option>`; });
  div.innerHTML = `
    <div class="field">
      <label>Ticket (R$)</label>
      <div class="range-values"><span id="tkt-min-label"></span><span id="tkt-max-label"></span></div>
      <div class="range-slider-wrap">
        <div class="range-track"></div>
        <div class="range-track-fill" id="range-fill"></div>
        <input type="range" id="tkt-min" min="${TKT_MIN}" max="${TKT_MAX}" value="${TKT_MIN}" step="1" />
        <input type="range" id="tkt-max" min="${TKT_MIN}" max="${TKT_MAX}" value="${TKT_MAX}" step="1" />
      </div>
    </div>
    <div class="field">
      <label>Metragem (m²)</label>
      <div class="range-values"><span id="mts-min-label"></span><span id="mts-max-label"></span></div>
      <div class="range-slider-wrap">
        <div class="range-track"></div>
        <div class="range-track-fill" id="range-fill-mts"></div>
        <input type="range" id="mts-min" min="${MTS_MIN}" max="${MTS_MAX}" value="${MTS_MIN}" step="1" />
        <input type="range" id="mts-max" min="${MTS_MIN}" max="${MTS_MAX}" value="${MTS_MAX}" step="1" />
      </div>
    </div>
    <div class="field">
      <label>Dormitórios</label>
      <select id="dorms-select">${optsDorms}</select>
    </div>
    <div class="field">
      <label>Tipologia</label>
      <select id="tipo-select">${opts}</select>
    </div>
    <div id="filter-count" style="font-size:12px; color:#555;"></div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
filterControl.addTo(map);

function updateRangeUI() {
  const minEl = document.getElementById('tkt-min');
  const maxEl = document.getElementById('tkt-max');
  let minV = parseFloat(minEl.value);
  let maxV = parseFloat(maxEl.value);
  if (minV > maxV) { [minV, maxV] = [maxV, minV]; }
  document.getElementById('tkt-min-label').textContent = formatBRL(minV);
  document.getElementById('tkt-max-label').textContent = formatBRL(maxV);
  const pctMin = ((minV - TKT_MIN) / (TKT_MAX - TKT_MIN)) * 100;
  const pctMax = ((maxV - TKT_MIN) / (TKT_MAX - TKT_MIN)) * 100;
  const fill = document.getElementById('range-fill');
  fill.style.left = pctMin + '%';
  fill.style.width = (pctMax - pctMin) + '%';
}

function updateRangeUIMts() {
  const minEl = document.getElementById('mts-min');
  const maxEl = document.getElementById('mts-max');
  let minV = parseFloat(minEl.value);
  let maxV = parseFloat(maxEl.value);
  if (minV > maxV) { [minV, maxV] = [maxV, minV]; }
  document.getElementById('mts-min-label').textContent = formatM2(minV);
  document.getElementById('mts-max-label').textContent = formatM2(maxV);
  const pctMin = ((minV - MTS_MIN) / (MTS_MAX - MTS_MIN)) * 100;
  const pctMax = ((maxV - MTS_MIN) / (MTS_MAX - MTS_MIN)) * 100;
  const fill = document.getElementById('range-fill-mts');
  fill.style.left = pctMin + '%';
  fill.style.width = (pctMax - pctMin) + '%';
}

document.getElementById('tkt-min').addEventListener('input', function() {
  if (parseFloat(this.value) > parseFloat(document.getElementById('tkt-max').value)) {
    document.getElementById('tkt-max').value = this.value;
  }
  updateRangeUI();
  renderProps();
});
document.getElementById('tkt-max').addEventListener('input', function() {
  if (parseFloat(this.value) < parseFloat(document.getElementById('tkt-min').value)) {
    document.getElementById('tkt-min').value = this.value;
  }
  updateRangeUI();
  renderProps();
});
document.getElementById('mts-min').addEventListener('input', function() {
  if (parseFloat(this.value) > parseFloat(document.getElementById('mts-max').value)) {
    document.getElementById('mts-max').value = this.value;
  }
  updateRangeUIMts();
  renderProps();
});
document.getElementById('mts-max').addEventListener('input', function() {
  if (parseFloat(this.value) < parseFloat(document.getElementById('mts-min').value)) {
    document.getElementById('mts-min').value = this.value;
  }
  updateRangeUIMts();
  renderProps();
});
document.getElementById('tipo-select').addEventListener('change', renderProps);
document.getElementById('dorms-select').addEventListener('change', renderProps);

updateRangeUI();
updateRangeUIMts();
renderProps();
</script>
</body>
